<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perjuma – Contact Us</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green:      #7B9E6B;
      --green-dark: #5f8150;
      --gold:       #F5C538;
      --dark:       #111111;
      --light-bg:   #f2f2ef;
      --white:      #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--dark);
      background: var(--light-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── NAVBAR ─────────────────────────────────────────────── */
    nav {
      background: #2d4a1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 56px;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--white);
    }
    .logo svg { width: 30px; height: 30px; }
    .nav-links { display: flex; gap: 44px; list-style: none; }
    .nav-links a {
      text-decoration: none;
      color: rgba(255,255,255,0.9);
      font-weight: 500;
      font-size: 0.95rem;
      padding-bottom: 3px;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-links a.active {
      color: var(--white);
      font-weight: 700;
      border-bottom: 2px solid var(--white);
    }
    .nav-btns { display: flex; align-items: center; gap: 20px; }
    .btn-nav-workshop {
      background: var(--gold);
      border: 2px solid var(--dark);
      border-radius: 50px;
      padding: 9px 26px;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .btn-nav-enquiries {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 50px;
      padding: 9px 22px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--white);
      cursor: pointer;
    }

    /* ─── PAGE BODY ──────────────────────────────────────────── */
    .page-body {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px 80px;
      background: var(--light-bg);
    }

    /* ─── FORM CARD ──────────────────────────────────────────── */
    .form-card {
      background: var(--white);
      border-radius: 16px;
      padding: 64px 56px 72px;
      width: 100%;
      max-width: 960px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.05);
    }

    .version-badge {
      display: block;
      margin: 0 auto 32px;
      width: fit-content;
      background: #ebebeb;
      color: #555;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 50px;
    }

    .form-heading {
      text-align: center;
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 52px;
      color: var(--dark);
    }

    /* ─── FIELDS ─────────────────────────────────────────────── */
    .field { width: 100%; margin-bottom: 18px; }

    .field input,
    .field textarea {
      width: 100%;
      padding: 18px 20px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.97rem;
      color: var(--dark);
      background: var(--white);
      outline: none;
      transition: border-color .2s;
      resize: vertical;
    }
    .field input::placeholder,
    .field textarea::placeholder { color: #aaa; }
    .field input:focus,
    .field textarea:focus { border-color: var(--green); }

    .field textarea {
      min-height: 120px;
      line-height: 1.6;
    }

    .btn-submit {
      width: 100%;
      background: var(--green);
      color: var(--white);
      border: none;
      border-radius: 8px;
      padding: 18px;
      font-family: inherit;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 6px;
      transition: background .2s;
      letter-spacing: 0.3px;
    }
    .btn-submit:hover { background: var(--green-dark); }

    /* ─── FOOTER ─────────────────────────────────────────────── */
    footer {
      background: var(--white);
      border-top: 1px solid #e8e8e8;
      padding: 64px 80px 48px;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1.5fr;
      gap: 40px;
    }
    .footer-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--dark);
    }
    .footer-logo svg { width: 28px; height: 28px; }
    .footer-col h4 { font-weight: 700; font-size: 0.95rem; margin-bottom: 14px; }
    .footer-col hr { border: none; border-top: 1px solid #ddd; margin-bottom: 22px; }
    .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 18px; }
    .footer-col ul li a {
      text-decoration: none; color: #333; font-size: 0.93rem; transition: color .2s;
    }
    .footer-col ul li a:hover { color: var(--green); }
    .footer-col ul li a.underline-link {
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-color: var(--green);
    }
    .contact-item { display: flex; gap: 13px; align-items: flex-start; margin-bottom: 18px; }
    .ci-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .ci-icon.light { background: #f4f4f4; border: 1px solid #ddd; }
    .ci-icon.dark  { background: var(--dark); }
    .ci-icon svg { width: 16px; height: 16px; }
    .ci-icon.light svg { stroke: var(--dark); fill: none; stroke-width: 2; }
    .ci-icon.dark  svg { stroke: white; fill: none; stroke-width: 2; }
    .ci-info strong { display: block; font-size: 0.92rem; font-weight: 600; }
    .ci-info span   { display: block; color: #777; font-size: 0.83rem; margin-top: 1px; }

    /* ─── HAMBURGER ─────────────────────────────────────── */
    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }
    .nav-hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--white);
      border-radius: 2px;
    }
    .mobile-nav {
      display: none;
      flex-direction: column;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 199;
      background: #2d4a1e;
      padding: 16px 24px 24px;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav a {
      text-decoration: none;
      color: rgba(255,255,255,0.9);
      font-weight: 600;
      font-size: 1rem;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      display: block;
    }
    .mobile-cta-wrap { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
    .mobile-btn-primary {
      background: var(--gold);
      border: 2px solid var(--dark);
      border-radius: 50px;
      padding: 11px 20px;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.9rem;
      text-align: center;
      display: block;
      text-decoration: none;
      color: var(--dark);
    }
    .mobile-btn-secondary {
      font-weight: 600;
      font-size: 0.9rem;
      text-align: center;
      display: block;
      padding: 8px;
      color: rgba(255,255,255,0.9);
      text-decoration: none;
    }

    /* ─── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 768px) {
      nav { padding: 14px 20px; position: relative; }
      .nav-links, .nav-btns { display: none; }
      .nav-hamburger { display: flex; }

      .form-card { padding: 40px 24px 48px; }
      .form-heading { font-size: 1.8rem; margin-bottom: 36px; }

      footer { padding: 48px 24px 40px; }
      .footer-grid { grid-template-columns: 1fr 1fr; gap: 28px; }
    }
    @media (max-width: 480px) {
      .footer-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ═══════════════ NAVBAR ═══════════════ -->
<nav>
  <a class="logo" href="perjuma">
    <img src="images/Perjuma.png" alt="Perjuma logo" style="width:32px;height:32px;object-fit:contain;"/>
    Perjuma AgTech
  </a>
  <ul class="nav-links">
    <li><a href="perjuma-about">About Us</a></li>
    <li><a href="perjuma-services">FarmSight</a></li>
  </ul>
  <div class="nav-btns">
    <button class="btn-nav-workshop" onclick="location.href='perjuma-contact'">Get Started</button>
    <button class="btn-nav-enquiries" onclick="location.href='perjuma-enquiries'">Enquiries</button>
  </div>
  <button class="nav-hamburger" onclick="toggleMenu()" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>
  <div class="mobile-nav" id="mobileMenu">
    <a href="perjuma-about">About Us</a>
    <a href="perjuma-services">FarmSight</a>
    <div class="mobile-cta-wrap">
      <a href="perjuma-contact" class="mobile-btn-primary">Get Started</a>
      <a href="perjuma-enquiries" class="mobile-btn-secondary">Enquiries</a>
    </div>
  </div>
</nav>

<!-- ═══════════════ FORM ═══════════════ -->
<div class="page-body">
  <div class="form-card">
    <h1 class="form-heading">Get Started. Fill the form</h1>

    <form id="contactForm" action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="05f6bce1-aaef-4889-ba27-4dcaf3832da3"/>
      <input type="hidden" name="subject" value="New Contact Enquiry – Perjuma AgTech"/>
      <input type="hidden" name="from_name" value="Perjuma AgTech Website"/>
      <input type="checkbox" name="botcheck" style="display:none;"/>

      <div class="field">
        <input type="text" name="name" placeholder="Name *" required/>
      </div>
      <div class="field">
        <input type="email" name="email" placeholder="E-mail *" required/>
      </div>
      <div class="field">
        <input type="tel" name="phone" placeholder="Phone Number *" required/>
      </div>
      <div class="field">
        <textarea name="message" placeholder="How can we be of help? *" required></textarea>
      </div>

      <button type="submit" class="btn-submit">Submit</button>

      <div id="formResult" style="display:none; margin-top:20px; padding:14px 18px; border-radius:10px; font-size:0.95rem; font-weight:600; text-align:center;"></div>
    </form>
  </div>
</div>

<!-- ═══════════════ FOOTER ═══════════════ -->
<footer>
  <div class="footer-grid">
    <div>
      <a class="footer-logo" href="perjuma">
        <img src="images/Perjuma.png" alt="Perjuma logo" style="width:28px;height:28px;object-fit:contain;"/>
        Perjuma AgTech  
      </a>
    </div>

    <div class="footer-col">
      <h4>Company</h4>
      <hr/>
      <ul>
        <li><a href="perjuma">Home</a></li>
        <li><a href="perjuma-about">About us</a></li>
        <li><a href="perjuma-services">FarmSight</a></li>
      </ul>
    </div>

    <div class="footer-col">
      <h4>Legal</h4>
      <hr/>
      <ul>
        <li><a href="perjuma-terms" class="underline-link">Terms of Use</a></li>
        <li><a href="perjuma-privacy" class="underline-link">Privacy Policy</a></li>
      </ul>
    </div>

    <div class="footer-col">
      <h4>Contact us</h4>
      <hr/>
      <div class="contact-item">
        <div class="ci-icon light">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.62 3.38 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 5.86 5.86l.77-.77a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </div>
        <div class="ci-info"><strong>+233 54 503 5410</strong></div>
      </div>
      <div class="contact-item">
        <div class="ci-icon light">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div class="ci-info">
          <strong>The Octagon</strong>
          <span>Accra Central</span>
        </div>
      </div>
      <div class="contact-item">
        <div class="ci-icon dark">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div class="ci-info">
          <strong>Email</strong>
          <span>info@perjuma.com</span>
        </div>
      </div>
    </div>
  </div>
</footer>

<script>
  document.getElementById('contactForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type=submit]');
    const result = document.getElementById('formResult');
    btn.disabled = true;
    btn.textContent = 'Sending…';
    const res = await fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(this) });
    const data = await res.json();
    result.style.display = 'block';
    if (data.success) {
      result.style.background = '#edf7ed';
      result.style.color = '#2e6b2e';
      result.textContent = '✓ Message sent! We\'ll be in touch shortly.';
      this.reset();
    } else {
      result.style.background = '#fdecea';
      result.style.color = '#b71c1c';
      result.textContent = '✗ Something went wrong. Please try again.';
    }
    btn.disabled = false;
    btn.textContent = 'Submit';
  });
function toggleMenu() {
  document.getElementById('mobileMenu').classList.toggle('open');
}
</script>
</body>
</html>
